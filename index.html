    <script type="text/babel">
        const { useEffect, useState } = React;


        const appBaseUrl = (() => {
          const { origin, pathname } = window.location;
          const normalizedPath = pathname.endsWith('/') ? pathname : `${pathname}/`;
          return `${origin}${normalizedPath}`;
        })();

        function toSiteUrl(relativePath) {
          const cleanPath = relativePath.replace(/^\.\//, '');
          return new URL(cleanPath, appBaseUrl).toString();
        }
        const eras = [
          { id: 'Paleozoic', name: 'פלאוזואיקון', color: 'border-blue-500', bg: 'bg-blue-500/10' },
          { id: 'Mesozoic', name: 'מזוזואיקון', color: 'border-green-500', bg: 'bg-green-500/10' },
          { id: 'Cenozoic', name: 'קנוזואיקון', color: 'border-yellow-500', bg: 'bg-yellow-500/10' }
        ];

        function App() {
          const [showAboutModal, setShowAboutModal] = useState(false);
          const [animals, setAnimals] = useState([]);
          const [isLoading, setIsLoading] = useState(true);
          const [error, setError] = useState('');

          useEffect(() => {
            async function loadAnimals() {
              try {
                const response = await fetch('./data/animals.json');
                if (!response.ok) {
                  throw new Error(`Failed to load data: ${response.status}`);
                }
                const data = await response.json();
                setAnimals(data);
                return;
              } catch (err) {
                // Fallback for file:// preview or restrictive hosting
                const fallbackNode = document.getElementById('animals-data');
                if (fallbackNode?.textContent) {
                  try {
                    const fallbackData = JSON.parse(fallbackNode.textContent);
                    setAnimals(fallbackData);
                    return;
                  } catch (parseErr) {
                    // continue to user-facing error below
                  }
                }
                setError('לא הצלחנו לטעון את נתוני הארכיון. נסו לרענן את הדף.');
              } finally {
                setIsLoading(false);
              }
            }

            loadAnimals();
          }, []);

          return (
            <div className="min-h-screen pb-24">
              <nav className="bg-gray-900 border-b border-gray-800 p-5 shadow-xl mb-8">
                <div className="max-w-6xl mx-auto flex justify-between items-center">
                  <div className="flex items-center gap-3">
                    <div className="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-900/40 text-white font-black text-xl">R</div>
                    <h1 className="text-xl md:text-2xl font-black tracking-tight uppercase">Paleo Archive</h1>
                  </div>
                  <button onClick={() => setShowAboutModal(true)} className="bg-gray-800 p-2.5 rounded-full border border-gray-700 active:scale-90 transition-transform">
                    <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                  </button>
                </div>
              </nav>

              <main className="max-w-6xl mx-auto px-5 animate-fadeIn space-y-12">
                <section className="bg-gradient-to-l from-pink-900/40 to-rose-700/20 border border-pink-500/30 rounded-3xl p-5 md:p-7 flex flex-col md:flex-row md:items-center md:justify-between gap-4">
                  <div className="space-y-2">
                    <h2 className="text-xl md:text-2xl font-black text-pink-100">חדש: סימולטור פתיחת עלי הכותרת של שושנה</h2>
                    <p className="text-sm text-pink-100/80">הדמיה אינטראקטיבית בעברית שממחישה שלב-אחר-שלב את מעבר הניצן לפריחה מלאה.</p>
                  </div>
                  <a href={toSiteUrl('./pages/rose-simulator.html')} className="inline-flex items-center justify-center px-5 py-3 bg-pink-600 hover:bg-pink-500 text-white rounded-2xl font-black transition-colors">
                    לפתיחת הסימולטור
                  </a>
                </section>

                {!isLoading && !error && (
                  <div className="text-xs text-gray-500 font-mono tracking-widest uppercase">Catalog Loaded: {animals.length} Entries</div>
                )}

                {isLoading && (
                  <div className="text-center text-gray-400 font-bold py-12">טוען נתוני ארכיון...</div>
                )}

                {!isLoading && error && (
                  <div className="bg-red-500/10 border border-red-500/30 text-red-300 rounded-2xl p-5 text-center font-bold">{error}</div>
                )}

                {!isLoading && !error && eras.map(era => (
                  <section key={era.id} className="space-y-6">
                    <div className={`inline-block px-5 py-1.5 rounded-full border-r-4 ${era.color} ${era.bg}`}>
                       <h3 className="text-lg font-black text-white">{era.name}</h3>
                    </div>

                    <div className="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
                      {animals.filter(a => a.era === era.id).map(animal => (
                        <a
                          key={animal.id}
                          href={animal.ready ? toSiteUrl(animal.path) : '#'}
                          className={`animal-card bg-gray-900 border ${animal.ready ? 'border-gray-700 shadow-lg ring-1 ring-gray-800' : 'border-gray-800 opacity-30 cursor-not-allowed'} rounded-[2rem] overflow-hidden p-1 relative group`}
                          onClick={(e) => { if(!animal.ready) e.preventDefault(); }}
                        >
                          <div className="aspect-square bg-gray-800/40 rounded-[1.7rem] flex items-center justify-center p-4 relative overflow-hidden">
                            <img
                              src={toSiteUrl(`assets/images/${animal.id}.png`)}
                              alt={animal.name}
                              className="max-w-full max-h-full object-contain drop-shadow-2xl transition-transform duration-500 group-hover:scale-110"
                              onError={(ev) => {
                                ev.target.style.display = 'none';
                              }}
                            />
                            {!animal.ready && (
                              <div className="absolute inset-0 bg-black/60 flex items-center justify-center">
                                <span className="text-[10px] font-bold text-gray-400 uppercase tracking-widest border border-gray-600 px-2 py-1 rounded-full bg-gray-900/80">Locked</span>
                              </div>
                            )}
                          </div>
                          <div className="p-3 text-center font-extrabold text-sm text-white">{animal.name}</div>
                        </a>
                      ))}
                    </div>
                  </section>
                ))}
              </main>

              {showAboutModal && (
                <div className="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/95 backdrop-blur-md animate-fadeIn" onClick={() => setShowAboutModal(false)}>
                  <div className="bg-gray-900 border border-gray-700 rounded-[3rem] p-10 text-center space-y-6 max-w-sm w-full shadow-2xl relative" onClick={e => e.stopPropagation()}>
                    <div className="w-32 h-32 rounded-full overflow-hidden border-4 border-blue-500 mx-auto shadow-[0_0_40px_rgba(59,130,246,0.4)]">
                      <img src={toSiteUrl("assets/images/ram-profile.jpeg")} alt="Ram" className="w-full h-full object-cover" onError={(e) => { e.target.src = toSiteUrl('assets/images/ram-profile.jpeg'); }} />
                    </div>
                    <div>
                        <h2 className="text-3xl font-black text-white uppercase tracking-tighter">Chief Researcher: RAM</h2>
                        <p className="text-blue-400 font-bold mb-3 uppercase text-xs tracking-[0.2em]">חוקר ראשי | היסטוריה ואבולוציה</p>
                        <p className="text-gray-400 text-sm leading-relaxed font-medium">
                        האנציקלופדיה נבנתה בארכיטקטורה שטוחה (Flat Structure) כדי להבטיח זמינות ומהירות לכל משתמש. כל מחקר בארכיון זה מאומת ומתועד בקפידה. התחביבים שלי הם יצירה בבינה מלאכותית וקריאת ביוגרפיות והיסטוריה.
                        </p>
                    </div>
                    <button onClick={() => setShowAboutModal(false)} className="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black shadow-lg shadow-blue-900/40 transition-colors">סגור ארכיון</button>
                  </div>
                </div>
              )}

              <footer className="p-12 text-center text-gray-700 text-[10px] uppercase tracking-[0.4em] font-mono border-t border-gray-900 mt-20">
                Ram Research Group // Verified Archive // 2026
              </footer>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
