<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>אנציקלופדיית פרה-היסטוריה - שער ראשי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fadeIn { animation: fadeIn 0.5s ease-out forwards; }
        body { background-color: #030712; color: #f3f4f6; overflow-x: hidden; }

    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        // הגדרת החיות והנתיבים שלהן בתיקיות
        const animals = [
          { id: 'dimetrodon', name: 'דימטרודון', era: 'Paleozoic', path: 'Paleozoic/dimetrodon.html', ready: true },
          { id: 'tyrannosaurus-rex', name: 'טירנוזאורוס רקס', era: 'Mesozoic', path: 'Mesozoic/tyrannosaurus-rex.html', ready: true },
          { id: 'smilodon', name: 'סמילודון', era: 'Cenozoic', path: 'Cenozoic/smilodon.html', ready: true },
          // חיות בבנייה (יופיעו כחסומות עד שנכין להן קובץ)
          { id: 'dunkleosteus', name: 'דנקליאוסטיוס', era: 'Paleozoic', ready: false },
          { id: 'arthropleura', name: 'ארתרופלאורה', era: 'Paleozoic', ready: false },
          { id: 'tiktaalik', name: 'טיקטאליק', era: 'Paleozoic', ready: false },
          { id: 'anomalocaris', name: 'אנומלוקאריס', era: 'Paleozoic', ready: false },
          { id: 'velociraptor', name: 'ולוצירפטור', era: 'Mesozoic', ready: false },
          { id: 'triceratops', name: 'טריצרטופס', era: 'Mesozoic', ready: false },
          { id: 'woolly-mammoth', name: 'ממותה צמרית', era: 'Cenozoic', ready: false }
        ];

        const eras = [
          { id: 'Paleozoic', name: 'פלאוזואיקון', color: 'border-blue-500', bg: 'bg-blue-500/10' },
          { id: 'Mesozoic', name: 'מזוזואיקון', color: 'border-green-500', bg: 'bg-green-500/10' },
          { id: 'Cenozoic', name: 'קנוזואיקון', color: 'border-yellow-500', bg: 'bg-yellow-500/10' }
        ];

        function App() {
          const [showAboutModal, setShowAboutModal] = useState(false);
          const [statusMsg, setStatusMsg] = useState('');

          const handleNavigate = (animal) => {
            if (animal.ready) {
              // מעבר לדף ה-HTML הנפרד בתיקייה
              window.location.href = animal.path;
            } else {
              setStatusMsg(`המחקר על ${animal.name} טרם הושלם...`);
              setTimeout(() => setStatusMsg(''), 2500);
            }
          };

          return (
            <div className="min-h-screen pb-24">
              {/* התראה קופצת */}
              {statusMsg && (
                <div className="fixed top-24 left-1/2 -translate-x-1/2 z-50 bg-blue-600 text-white px-6 py-3 rounded-2xl shadow-2xl animate-bounce font-bold text-sm">
                  {statusMsg}
                </div>
              )}

              {/* סרגל ניווט עליון - סטטי */}
              <nav class="bg-gray-900 border-b border-gray-800 p-5 shadow-xl relative mb-8">
                <div class="max-w-6xl mx-auto flex justify-between items-center">
                  <div class="flex items-center gap-3">
                    <div class="bg-blue-600 p-2 rounded-xl shadow-lg shadow-blue-900/40">
                      <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" strokeWidth="3"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>
                    </div>
                    <h1 class="text-2xl font-black tracking-tight">ארכיון פרה-היסטוריה</h1>
                  </div>
                  <button onClick={() => setShowAboutModal(true)} class="bg-gray-800 p-2.5 rounded-full border border-gray-700 active:scale-90 transition-transform">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><circle cx="12" cy="12" r="10"/><path d="M12 16v-4"/><path d="M12 8h.01"/></svg>
                  </button>
                </div>
              </nav>

              <main class="max-w-6xl mx-auto px-5 animate-fadeIn space-y-16">
                {eras.map(era => (
                  <section key={era.id} class="space-y-6">
                    <div class={`inline-block px-6 py-1.5 rounded-full border-r-4 ${era.color} ${era.bg}`}>
                       <h3 class="text-xl font-black text-white">{era.name}</h3>
                    </div>
                    
                    <div class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 gap-5">
                      {animals.filter(a => a.era === era.id).map(animal => (
                        <div 
                          key={animal.id} 
                          onClick={() => handleNavigate(animal)}
                          class={`animal-card group relative bg-gray-900 border ${animal.ready ? 'border-gray-700 shadow-xl ring-1 ring-gray-800' : 'border-gray-800 opacity-40'} rounded-[2rem] overflow-hidden cursor-pointer p-1`}
                        >
                          <div class="aspect-square bg-gray-800/40 rounded-[1.7rem] p-4 flex items-center justify-center relative overflow-hidden">
                            <img 
                              src={`./images/${animal.id}.png`} 
                              alt={animal.name} 
                              class="max-w-full max-h-full object-contain drop-shadow-2xl group-hover:scale-110 transition-transform duration-500" 
                              onError={(e) => { e.target.src = `./${animal.id}.png`; }} 
                            />
                            {!animal.ready && (
                              <div class="absolute inset-0 bg-black/60 backdrop-blur-[2px] flex items-center justify-center">
                                <span class="bg-gray-900 px-3 py-1 rounded-full text-[10px] font-bold border border-gray-700 tracking-widest text-gray-400">IN RESEARCH</span>
                              </div>
                            )}
                          </div>
                          <div class="p-4 text-center">
                            <div class={`font-extrabold text-sm ${animal.ready ? 'text-white' : 'text-gray-600'}`}>{animal.name}</div>
                          </div>
                        </div>
                      ))}
                    </div>
                  </section>
                ))}
              </main>

              {/* מודל אודות - מותאם אישית לרם */}
              {showAboutModal && (
                <div class="fixed inset-0 z-50 flex items-center justify-center p-6 bg-black/95 backdrop-blur-md animate-fadeIn" onClick={() => setShowAboutModal(false)}>
                  <div class="bg-gray-900 border border-gray-700 rounded-[3rem] p-10 text-center space-y-6 max-w-sm w-full shadow-2xl relative" onClick={e => e.stopPropagation()}>
                    <div class="w-32 h-32 rounded-full overflow-hidden border-4 border-blue-500 mx-auto shadow-[0_0_40px_rgba(59,130,246,0.5)]">
                      <img src="./ram-profile.jpeg" alt="Ram" class="w-full h-full object-cover" />
                    </div>
                    <div>
                      <h2 class="text-3xl font-black text-white">רם</h2>
                      <p class="text-blue-400 font-bold mb-3 uppercase text-xs tracking-[0.2em]">Chief Scientific Officer</p>
                      <p class="text-gray-400 text-sm leading-relaxed">
                        מומחה להיסטוריה ואבולוציה. האנציקלופדיה נבנתה בארכיטקטורה מבוזרת כדי לאפשר עומק מחקרי מקסימלי לכל מין ומין.
                      </p>
                    </div>
                    <button onClick={() => setShowAboutModal(false)} class="w-full bg-blue-600 hover:bg-blue-500 text-white py-4 rounded-2xl font-black transition-all shadow-lg shadow-blue-900/40">
                      חזרה למחקר
                    </button>
                  </div>
                </div>
              )}
              
              <footer class="p-12 text-center text-gray-700 text-[10px] uppercase tracking-[0.4em] font-mono border-t border-gray-900 mt-20">
                Ram Research Group // Verified Archive // 2026
              </footer>
            </div>
          );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
