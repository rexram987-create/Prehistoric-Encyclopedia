<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>סימולטור פתיחת עלי כותרת - שושנה</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      background: radial-gradient(circle at top, #1f1028, #09050d 55%, #050308);
      color: #f5e9f0;
      min-height: 100vh;
      font-family: system-ui, -apple-system, sans-serif;
    }

    .rose-core {
      filter: drop-shadow(0 0 24px rgba(239, 68, 68, 0.35));
    }
  </style>
</head>
<body class="p-4 md:p-8">
  <main class="max-w-5xl mx-auto space-y-6">
    <header class="space-y-3 text-center">
      <a href="../index.html" class="inline-block text-pink-300/80 hover:text-pink-200 font-bold">← חזרה לארכיון הראשי</a>
      <h1 class="text-3xl md:text-5xl font-black">סימולטור פתיחת עלי הכותרת של שושנה</h1>
      <p class="text-pink-100/80 max-w-2xl mx-auto">הדמיה אינטראקטיבית שממחישה איך ניצן השושנה נפתח בהדרגה, משלב סגור ועד לפריחה מלאה.</p>
    </header>

    <section class="grid gap-6 lg:grid-cols-[2fr_1fr] items-start">
      <div class="bg-black/25 border border-pink-200/10 rounded-3xl p-4 md:p-8">
        <svg id="rose-view" viewBox="0 0 500 500" class="w-full aspect-square">
          <defs>
            <radialGradient id="petalGradient" cx="45%" cy="35%" r="70%">
              <stop offset="0%" stop-color="#ff9fbb" />
              <stop offset="55%" stop-color="#ef476f" />
              <stop offset="100%" stop-color="#9f1239" />
            </radialGradient>
            <linearGradient id="stemGradient" x1="0%" y1="0%" x2="0%" y2="100%">
              <stop offset="0%" stop-color="#84cc16" />
              <stop offset="100%" stop-color="#14532d" />
            </linearGradient>
          </defs>

          <rect width="500" height="500" fill="transparent"></rect>

          <path d="M250 320 C235 350, 230 390, 235 490 L265 490 C270 390, 265 350, 250 320 Z" fill="url(#stemGradient)"></path>
          <ellipse cx="214" cy="405" rx="50" ry="20" transform="rotate(-26 214 405)" fill="#166534" opacity="0.85"></ellipse>
          <ellipse cx="285" cy="385" rx="48" ry="18" transform="rotate(24 285 385)" fill="#15803d" opacity="0.85"></ellipse>

          <g id="petal-layer-outer"></g>
          <g id="petal-layer-mid"></g>
          <g id="petal-layer-inner"></g>
          <circle class="rose-core" cx="250" cy="250" r="26" fill="#7f1d1d"></circle>
        </svg>
      </div>

      <aside class="bg-black/35 border border-pink-200/10 rounded-3xl p-5 space-y-5">
        <div>
          <label for="bloomRange" class="block font-bold mb-2">רמת פריחה</label>
          <input id="bloomRange" type="range" min="0" max="100" value="10" class="w-full accent-pink-500" />
          <div class="flex justify-between text-xs text-pink-100/60 mt-1"><span>ניצן סגור</span><span>פריחה מלאה</span></div>
        </div>

        <div class="flex flex-wrap gap-2">
          <button id="playBtn" class="px-4 py-2 bg-pink-600 hover:bg-pink-500 rounded-xl font-bold">הפעל אנימציה</button>
          <button id="resetBtn" class="px-4 py-2 bg-zinc-700 hover:bg-zinc-600 rounded-xl font-bold">איפוס</button>
        </div>

        <div class="bg-pink-950/30 border border-pink-400/20 rounded-2xl p-4 text-sm leading-6">
          <p><strong>שלב נוכחי:</strong> <span id="phaseText">ניצן צעיר</span></p>
          <p class="text-pink-100/75 mt-2">העלי הכותרת החיצוניים נפתחים ראשונים ומאפשרים לעלי הכותרת הפנימיים להיפתח בצורה ספירלית עדינה.</p>
        </div>
      </aside>
    </section>
  </main>

  <script>
    const outerLayer = document.getElementById('petal-layer-outer');
    const midLayer = document.getElementById('petal-layer-mid');
    const innerLayer = document.getElementById('petal-layer-inner');
    const bloomRange = document.getElementById('bloomRange');
    const phaseText = document.getElementById('phaseText');
    const playBtn = document.getElementById('playBtn');
    const resetBtn = document.getElementById('resetBtn');

    let animationFrame;
    let progress = Number(bloomRange.value);
    let playing = false;

    function petalPath(length = 110, width = 44) {
      return `M0 0 C ${-width} ${-length * 0.3}, ${-width} ${-length * 0.85}, 0 ${-length} C ${width} ${-length * 0.85}, ${width} ${-length * 0.3}, 0 0 Z`;
    }

    function buildLayer(group, count, radius, openness, scale, delay = 0) {
      group.innerHTML = '';
      const angleStep = 360 / count;
      const petal = petalPath(115 * scale, 38 * scale);

      for (let i = 0; i < count; i += 1) {
        const angle = i * angleStep + delay;
        const openFactor = openness / 100;
        const rotation = -70 + (openFactor * 75);
        const rise = 16 - (openFactor * 36);
        const spread = radius + (openFactor * 34);

        const x = 250 + Math.cos((angle * Math.PI) / 180) * spread;
        const y = 250 + Math.sin((angle * Math.PI) / 180) * spread + rise;

        const p = document.createElementNS('http://www.w3.org/2000/svg', 'path');
        p.setAttribute('d', petal);
        p.setAttribute('fill', 'url(#petalGradient)');
        p.setAttribute('opacity', String(0.82 + (openFactor * 0.15)));
        p.setAttribute('transform', `translate(${x} ${y}) rotate(${angle + 90}) rotate(${rotation})`);
        group.appendChild(p);
      }
    }

    function phaseLabel(value) {
      if (value < 20) return 'ניצן צעיר';
      if (value < 45) return 'תחילת פתיחה';
      if (value < 75) return 'פריחה מתרחבת';
      return 'פריחה מלאה';
    }

    function renderRose(value) {
      buildLayer(outerLayer, 8, 74, value, 1.05, 0);
      buildLayer(midLayer, 7, 48, Math.max(0, value - 8), 0.88, 12);
      buildLayer(innerLayer, 5, 25, Math.max(0, value - 16), 0.68, -8);
      phaseText.textContent = phaseLabel(value);
    }

    function animate() {
      if (!playing) return;
      progress = Math.min(progress + 0.45, 100);
      bloomRange.value = String(progress);
      renderRose(progress);

      if (progress >= 100) {
        playing = false;
        playBtn.textContent = 'הפעל אנימציה';
        return;
      }

      animationFrame = requestAnimationFrame(animate);
    }

    bloomRange.addEventListener('input', (event) => {
      progress = Number(event.target.value);
      renderRose(progress);
    });

    playBtn.addEventListener('click', () => {
      if (playing) {
        playing = false;
        cancelAnimationFrame(animationFrame);
        playBtn.textContent = 'הפעל אנימציה';
        return;
      }

      playing = true;
      playBtn.textContent = 'עצור';
      animationFrame = requestAnimationFrame(animate);
    });

    resetBtn.addEventListener('click', () => {
      playing = false;
      cancelAnimationFrame(animationFrame);
      progress = 10;
      bloomRange.value = String(progress);
      playBtn.textContent = 'הפעל אנימציה';
      renderRose(progress);
    });

    renderRose(progress);
  </script>
</body>
</html>
