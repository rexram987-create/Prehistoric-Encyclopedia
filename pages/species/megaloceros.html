<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>אנציקלופדיה פלאונטולוגית: מחקר מגלוצרוס (Megaloceros) אולטימטיבי</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Assistant:wght@200;400;700;800&display=swap');
        body { 
            background-color: #030712; 
            color: #e5e7eb; 
            font-family: 'Assistant', sans-serif;
            line-height: 1.6;
            overflow-x: hidden;
        }
        .glass-card {
            background: rgba(17, 24, 39, 0.7);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(245, 158, 11, 0.3);
        }
        .accent-gradient {
            background: linear-gradient(135deg, #f59e0b 0%, #78350f 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .highlight-box {
            border-right: 4px solid #f59e0b;
            background: rgba(245, 158, 11, 0.05);
        }
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.9);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.3s ease;
            backdrop-filter: blur(5px);
        }
        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            max-width: 90%;
            max-height: 90%;
            transform: scale(0.9);
            transition: transform 0.3s ease;
            border-radius: 1rem;
            box-shadow: 0 0 40px rgba(245, 158, 11, 0.4);
        }
        .modal-overlay.active .modal-content {
            transform: scale(1);
        }
        .close-modal {
            position: absolute;
            top: 1rem;
            right: 1.5rem;
            color: white;
            font-size: 2rem;
            cursor: pointer;
            z-index: 101;
        }
    </style>
</head>

<body class="antialiased pb-24 text-justify">

    <div id="imageModal" class="modal-overlay" onclick="closeModal(event)">
        <span class="close-modal">&times;</span>
        <img id="modalImg" class="modal-content" src="" alt="תמונה מוגדלת">
    </div>

    <nav class="bg-gray-900/90 border-b border-gray-800 p-5 shadow-2xl">
        <div class="max-w-5xl mx-auto flex items-center justify-between">
            <a href="../../index.html" class="flex items-center gap-3 text-amber-500 hover:text-amber-400 transition-all group">
                <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" class="group-hover:-translate-x-1 transition-transform"><path d="m12 19-7-7 7-7"/><path d="M19 12H5"/></svg>
                <span class="font-extrabold text-xl tracking-tight text-white">ארכיון האנציקלופדיה</span>
            </a>
            <div class="text-gray-500 font-mono text-[10px] uppercase tracking-[0.2em]">The Giant Deer // File: MEGALOCEROS-ULTIMATE</div>
        </div>
    </nav>

    <main class="max-w-5xl mx-auto p-6 md:p-10 space-y-20">
        
        <header class="text-center space-y-6 pt-10">
            <div class="inline-block px-4 py-1 rounded-full bg-amber-500/10 border border-amber-500/30 text-amber-500 text-xs font-bold uppercase tracking-widest mb-4 shadow-[0_0_15px_rgba(245,158,11,0.2)]">
                אייל הענק של עידן הקרח
            </div>

            <h1 class="text-6xl md:text-8xl font-black accent-gradient tracking-tighter">מגלוצרוס</h1>
            <p class="text-2xl md:text-3xl text-gray-500 font-light italic" dir="ltr">The Giant Deer: Megaloceros giganteus</p>
            
            <div class="relative mt-12 group">
                <div class="absolute -inset-1 bg-gradient-to-r from-amber-500 to-yellow-900 rounded-[2.5rem] blur opacity-25 group-hover:opacity-40 transition duration-1000"></div>
                <div class="relative bg-gray-900 rounded-[3rem] p-6 border border-gray-800 overflow-hidden shadow-2xl">
